<ssr:var name="user" type="struct{Age uint8; Info string}"/>
<ssr:var name="lastSeen" type="string" reactive="true"/>

<h1>Age group:
    <span ssr:if="user.Age <= 18">0-18</span>
    <span ssr:else-if="user.Age <= 30">19-30</span>
    <!-- Older age groups -->
    <span ssr:else-if="user.Age <= 60">31-60</span>
    <!-- Default case -->
    <span ssr:else>60+</span>
</h1>

<p class="mt-3">{{ user.Info }}</p>

<p class="text-muted small mt-2">Last seen: <span>{{ lastSeen }}</span></p>
